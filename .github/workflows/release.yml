name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    name: Check if release needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: decide
        run: |
          VERSION=$(grep -E '^ +MARKETING_VERSION:' project.yml | awk '{print $2}' | tr -d '"')
          if [ -z "$VERSION" ]; then
            echo "::error::MARKETING_VERSION not found in project.yml"
            exit 1
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on remote, skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist, will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check landing-page version sync
        run: ./scripts/sync-landing-version.sh --check

  build:
    name: Build unsigned DMG
    needs: check
    if: needs.check.outputs.should_release == 'true'
    # macos-26 ships Xcode 26 / macOS 26 SDK so SwiftUI controls render with
    # Liquid Glass on macOS 26 while still running on the deployment target
    # (macOS 14+) with automatic fallback.
    runs-on: macos-26
    env:
      VERSION: ${{ needs.check.outputs.version }}
      TAG: ${{ needs.check.outputs.tag }}
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install toolchain
        run: |
          brew install xcodegen create-dmg git-cliff
          brew install --cask gh || true

      # TODO(zig-unpin): 等上游 ghostty 适配 zig 0.16+ 后，移除这里的版本锁，
      # 改回 `brew install zig`。当前 pin 到 0.15.2 是因为：
      #   1. ghostty build.zig 的 requireZig 要求 v0.15.2
      #   2. zig 0.16 的 Dir.readFileAlloc 从 3 参改成 4 参，导致 build.zig:27 编译失败
      # 解锁时同步更新 scripts/build-vendor.sh 与 docs/build.md 里对 zig 版本的说明。
      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty
        run: ./scripts/build-vendor.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release (universal) ad-hoc signed
        # No Apple Developer ID available on this fork — sign ad-hoc so the
        # binary still launches locally. macOS Gatekeeper will warn first run;
        # users must right-click → Open or run `xattr -dr com.apple.quarantine`.
        run: |
          xcodebuild \
            -project mux0.xcodeproj \
            -scheme mux0 \
            -configuration Release \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=NO \
            OTHER_CODE_SIGN_FLAGS="" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            build

      - name: Generate changelog
        # `--latest` reads the most recent existing tag, but the new release
        # tag is created later in this job, so it would emit the previous
        # release's commits. `--unreleased` walks from the latest existing
        # tag up to HEAD, which is exactly the new release's range.
        run: git-cliff --unreleased --strip header --config cliff.toml --output CHANGELOG.md

      - name: Create DMG
        id: dmg
        run: |
          DMG="mux0-${VERSION}-universal.dmg"
          create-dmg \
            --volname "mux0 ${VERSION}" \
            --window-size 520 320 \
            --icon-size 96 \
            --app-drop-link 380 180 \
            "$DMG" \
            "build/Build/Products/Release/mux0.app"
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            "${{ steps.dmg.outputs.path }}" \
            --title "$TAG" \
            --notes-file CHANGELOG.md
