			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "rm -rf \"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/agent-hooks\"\nmkdir -p \"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/agent-hooks\"\ncp -R \"$SRCROOT/Resources/agent-hooks/\" \"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/agent-hooks/\"\nchmod +x \"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/agent-hooks/\"*.sh 2>/dev/null || true\n\n# --- auto-activate mux0 status hooks by appending to ghostty's shell-integration scripts ---\n\n_mux0_append_once() {\n    # $1: target file  $2: marker  $3: line to append\n    local f=\"$1\" marker=\"$2\" line=\"$3\"\n    [ -f \"$f\" ] || return 0\n    grep -q \"$marker\" \"$f\" 2>/dev/null && return 0\n    {\n        echo \"\"\n        echo \"# mux0: auto-load agent status hooks\"\n        echo \"$line\"\n    } >> \"$f\"\n}\n\nGHOSTTY_DIR=\"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/ghostty/shell-integration\"\n\n# zsh — find which file ghostty ships (different ghostty versions name it differently)\nfor candidate in \"$GHOSTTY_DIR/zsh/.zshrc\" \\\n                 \"$GHOSTTY_DIR/zsh/ghostty-integration\" \\\n                 \"$GHOSTTY_DIR/zsh/.zshenv\"; do\n    _mux0_append_once \"$candidate\" \"MUX0_AGENT_HOOKS_DIR\" \\\n        '[ -f \"$MUX0_AGENT_HOOKS_DIR/bootstrap.zsh\" ] && source \"$MUX0_AGENT_HOOKS_DIR/bootstrap.zsh\"'\ndone\n\n# bash — ghostty typically uses bash-integration / ghostty.bash or an rc-file\nfor candidate in \"$GHOSTTY_DIR/bash/bash-preexec.sh\" \\\n                 \"$GHOSTTY_DIR/bash/ghostty.bash\" \\\n                 \"$GHOSTTY_DIR/bash/ghostty-bash-integration.bash\"; do\n    _mux0_append_once \"$candidate\" \"MUX0_AGENT_HOOKS_DIR\" \\\n        '[ -f \"$MUX0_AGENT_HOOKS_DIR/bootstrap.bash\" ] && source \"$MUX0_AGENT_HOOKS_DIR/bootstrap.bash\"'\ndone\n\n# fish — ghostty drops an auto-loaded conf.d file\nfor candidate in \"$GHOSTTY_DIR/fish/vendor_conf.d/ghostty-shell-integration.fish\" \\\n                 \"$GHOSTTY_DIR/fish/conf.d/ghostty-shell-integration.fish\"; do\n    _mux0_append_once \"$candidate\" \"MUX0_AGENT_HOOKS_DIR\" \\\n        'test -f \"$MUX0_AGENT_HOOKS_DIR/bootstrap.fish\"; and source \"$MUX0_AGENT_HOOKS_DIR/bootstrap.fish\"'\ndone\n";
		};
